<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TVP Sport Live</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
<style>
body{
margin:0;
background:#000;
}
video{
width:100%;
height:100vh;
}
  #watermark{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
z-index:9999;
color:white;
font-size:22px;
font-weight:bold;
background:rgba(0,0,0,0.5);
padding:8px 12px;
border-radius:8px;
pointer-events:none;
}
  #popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
z-index:10000;
}

#popup-box{
background:#0a1635;
padding:25px;
border-radius:15px;
text-align:center;
max-width:350px;
color:white;
}

#insta-btn{
background:#e1306c;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-right:10px;
}

#later-btn{
background:#555;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:18px;
cursor:pointer;
}
</style>
</head>
<body>
  <div id="watermark">MEcool Live</div>
  <div id="popup">
  <div id="popup-box">
    <h2>MEcool Live</h2>
    <p>Follow our Instagram for updates.</p>

    <a href="https://instagram.com/mjftbl23" target="_blank">
      <button id="insta-btn">Follow Instagram</button>
    </a>

    <button id="later-btn" onclick="closePopup()">Later</button>
  </div>
</div>
<video id="video" controls autoplay></video>

<script>
async function init() {
const video = document.getElementById('video');
const player = new shaka.Player(video);

try {
await player.load(
'https://estreams.tv.nej.cz/dash/CH_TVP_SPORT_Portable.ism/playlist.mpd'
);
console.log('Stream Loaded');
} catch (e) {
console.error(e);
}
}

init();
  function closePopup(){
  document.getElementById("popup").style.display="none";
  document.getElementById("video").play();
}
</script>

</body>
</html>
