<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TVP Sport Live</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
<style>
body{
margin:0;
background:#000;
}
video{
width:100%;
height:100vh;
}
  #watermark{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
z-index:9999;
color:white;
font-size:22px;
font-weight:bold;
background:rgba(0,0,0,0.5);
padding:8px 12px;
border-radius:8px;
pointer-events:none;
}
 
</style>
</head>
<body>
  <div id="watermark">MEcool Live</div>
<video id="video" controls autoplay></video>

<script>
async function init() {
const video = document.getElementById('video');
const player = new shaka.Player(video);

try {
await player.load(
'https://estreams.tv.nej.cz/dash/CH_TVP_SPORT_Portable.ism/playlist.mpd'
);
console.log('Stream Loaded');
} catch (e) {
console.error(e);
}
}

init();

</script>

</body>
</html>
